name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: quality · build · release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Quality gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src
          uv run pytest

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            docs/changelog.md > release_notes.txt
          # Eliminar líneas vacías del inicio y fin
          sed -i '/./,$!d' release_notes.txt
          [ -s release_notes.txt ] || echo "_(sin notas de release para ${VERSION})_" > release_notes.txt

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          files: dist/*
          fail_on_unmatched_files: false

      # Para publicar en PyPI, configura un Trusted Publisher en pypi.org
      # (Settings → Publishing → Add Publisher) y descomenta:
      # - name: Publish to PyPI
      #   run: uv publish
