# Pre-commit hooks. Instala con: `uv run pre-commit install`
# Ejecuta manualmente sobre todos los ficheros: `uv run pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pytest]
        args: [--config-file=pyproject.toml]
        files: ^src/

  # ---------------------------------------------------------------------------
  # Documentación viva: si tocas src/ y NO actualizas docs/changelog.md o
  # docs/STATE.md en el mismo commit, avisa (warning, no bloquea).
  # Para volverlo bloqueante, cambia el script para que `exit 1`.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: docs-sync-check
        name: docs viva sincronizada
        entry: bash -c 'STAGED=$(git diff --cached --name-only); SRC=$(echo "$STAGED" | grep -E "^src/.*\.py$" | head -1); DOCS=$(echo "$STAGED" | grep -E "^docs/(STATE|changelog|specs/.*)\.md$" | head -1); if [ -n "$SRC" ] && [ -z "$DOCS" ]; then echo "WARNING: estás commiteando cambios en src/ sin tocar docs/. Considera ejecutar /state y /changelog antes de commitear."; fi; exit 0'
        language: system
        pass_filenames: false
        stages: [pre-commit]
